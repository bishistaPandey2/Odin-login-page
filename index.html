<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="image-container">
        <img src="assets/halie-west-25xggax4bSA-unsplash.jpg" alt="">
        <div class="logo">
            <img src="assets/odin-lined.png" alt="" class="odin-logo">
            <div class="name">Odin</div>
        </div>
       
    </div>
    <div class="form-container">
        <div class="introduction">
            This is not a real online servise! You know you need something like this to level up in life.
        </div>
        <div>Sign up to get started</div>
        <div>You know you want to.</div>
        <form action="example/com" id="registration-form">
            <div class="invitaion">Let's do it!</div>
            <div class="form-section">
                <div class="form-input">
                    <label for="first_name">first name</label>
                    <input type="text" id="first_name" required>
                </div>
                <div class="form-input">
                    <label for="last_name">last name</label>
                    <input type="text" id="last_name" required>
                </div>
            </div>
            <div class="form-section">
                <div class="form-input">
                    <label for="email">email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-input">
                    <label for="phone_number">phone number</label>
                    <input type="number" id="phone_number" required>
                </div>
            </div>
            <div class="form-section">
                <div class="form-input">
                    <label for="first_name">password</label>
                    <input type="password" id="first_name" minlength="8" required>
                </div>
                <div class="form-input">
                    <label for="last_name">confirm password</label>
                    <input type="password" id="last_name" required>
                </div>
            </div>
        </form>
        <button class="create-user" form="registration-form">Create User</button>
        <div class="already-loggedin">Already Registered? <span><a href="#">Log In</a></span></div>
    </div>
</body>
</html>
